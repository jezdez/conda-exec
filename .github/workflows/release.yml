name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Build sdist and wheel
        run: pipx run --spec build==1.5.0 pyproject-build

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  create-draft-release:
    name: Create draft GitHub Release
    runs-on: ubuntu-latest
    needs: [build]

    permissions:
      contents: write # Required to create the draft release and upload assets.

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Create immutable-ready draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          files=(dist/*)
          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists." >&2
            echo "Release immutability is enabled; create a new tag instead of replacing assets." >&2
            exit 1
          fi
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No distribution assets found." >&2
            exit 1
          fi

          gh release create "$RELEASE_TAG" \
            --draft \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --generate-notes \
            --repo "$GH_REPO"

          cleanup_draft() {
            gh release delete "$RELEASE_TAG" --repo "$GH_REPO" --yes >/dev/null 2>&1 || true
          }
          trap cleanup_draft ERR

          gh release upload "$RELEASE_TAG" "${files[@]}" --repo "$GH_REPO"

          trap - ERR

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [create-draft-release]
    environment: pypi

    permissions:
      id-token: write # Required for PyPI trusted publishing.

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          attestations: true

  publish-github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-pypi]

    permissions:
      contents: write # Required to publish the draft release after PyPI succeeds.

    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: gh release edit "$RELEASE_TAG" --repo "$GH_REPO" --draft=false
