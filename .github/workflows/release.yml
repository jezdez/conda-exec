name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Build sdist and wheel
        run: pipx run --spec build pyproject-build

      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import email.parser
          import glob
          import os
          import tarfile
          import zipfile

          expected = os.environ["RELEASE_TAG"].removeprefix("v")

          wheels = glob.glob("dist/*.whl")
          sdists = glob.glob("dist/*.tar.gz")
          if len(wheels) != 1:
              raise SystemExit(f"expected exactly one wheel, found {wheels}")
          if len(sdists) != 1:
              raise SystemExit(f"expected exactly one sdist, found {sdists}")

          with zipfile.ZipFile(wheels[0]) as wheel:
              metadata_name = next(
                  name for name in wheel.namelist() if name.endswith(".dist-info/METADATA")
              )
              wheel_metadata = email.parser.Parser().parsestr(
                  wheel.read(metadata_name).decode()
              )

          with tarfile.open(sdists[0]) as sdist:
              pkg_info_name = next(
                  member.name for member in sdist.getmembers() if member.name.endswith("/PKG-INFO")
              )
              pkg_info_file = sdist.extractfile(pkg_info_name)
              if pkg_info_file is None:
                  raise SystemExit("sdist PKG-INFO could not be read")
              sdist_metadata = email.parser.Parser().parsestr(
                  pkg_info_file.read().decode()
              )

          versions = {
              "wheel": wheel_metadata["Version"],
              "sdist": sdist_metadata["Version"],
          }
          mismatches = {
              artifact: version
              for artifact, version in versions.items()
              if version != expected
          }
          if mismatches:
              raise SystemExit(
                  f"release tag {expected!r} does not match artifact versions {versions!r}"
              )

          print(f"Verified release version {expected}")
          PY

      - name: Check distributions
        run: pipx run --spec twine twine check dist/*

      - name: Smoke test wheel
        run: |
          python -m venv /tmp/conda-exec-wheel-smoke
          /tmp/conda-exec-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/conda-exec-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/conda-exec-wheel-smoke/bin/python -c "import conda_exec; import conda_exec.cli"
          /tmp/conda-exec-wheel-smoke/bin/ce --help

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    environment: pypi

    permissions:
      id-token: write # OIDC trusted publishing to PyPI

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/

  upload-release-assets:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: [publish-pypi]

    permissions:
      contents: write # upload assets to GitHub release

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG_NAME" dist/* --repo "$GH_REPO"
