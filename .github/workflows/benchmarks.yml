name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: test

      - name: Run benchmarks
        run: pixi run -e test bench

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results
          path: benchmark-results.json
          if-no-files-found: error

  track:
    name: Track benchmarks
    needs: benchmark
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: benchmarks
    permissions:
      actions: read # download benchmark results artifact
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: benchmark-results

      - uses: bencherdev/bencher@5f9d4cf890255c35e0354af1ed325108a6a0babd # v0.6.8

      - name: Track benchmarks
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
        run: |
          if [ -z "$BENCHER_API_TOKEN" ]; then
            echo "Skipping benchmark tracking because BENCHER_API_TOKEN is unavailable."
            exit 0
          fi

          bencher run \
            --project conda-exec \
            --token "$BENCHER_API_TOKEN" \
            --branch main \
            --testbed ubuntu-latest \
            --adapter python_pytest \
            --file benchmark-results.json \
            --threshold-measure latency \
            --threshold-test t_test \
            --threshold-upper-boundary 0.99 \
            --err

  check:
    name: Report benchmarks
    needs: benchmark
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: benchmarks
    permissions:
      actions: read # download benchmark results artifact
      contents: read
      pull-requests: write # allow Bencher to create/update the PR comment
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: benchmark-results

      - uses: bencherdev/bencher@5f9d4cf890255c35e0354af1ed325108a6a0babd # v0.6.8

      - name: Report benchmarks
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ -z "$BENCHER_API_TOKEN" ]; then
            echo "Skipping benchmark report because BENCHER_API_TOKEN is unavailable."
            exit 0
          fi

          bencher run \
            --project conda-exec \
            --token "$BENCHER_API_TOKEN" \
            --branch "$HEAD_REF" \
            --start-point "$BASE_REF" \
            --start-point-clone-thresholds \
            --start-point-reset \
            --testbed ubuntu-latest \
            --adapter python_pytest \
            --file benchmark-results.json \
            --threshold-measure latency \
            --threshold-test t_test \
            --threshold-upper-boundary 0.99 \
            --github-actions "$GH_TOKEN"
