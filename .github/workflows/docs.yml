name: Documentation

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/docs.yml"
      - "conda_exec/**"
      - "docs/**"
      - "pyproject.toml"
  pull_request:
    paths:
      - "docs/**"
      - "conda_exec/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: docs
      - run: pixi run -e docs sphinx-build -b dirhtml docs docs/_build/dirhtml
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/dirhtml

  pages:
    needs: docs
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
